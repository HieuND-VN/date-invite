<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Save the date </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink-50:  #fff5f7;
    --pink-100: #ffe4ec;
    --pink-200: #fbcfe0;
    --pink-300: #f5b5cc;
    --pink-400: #ee99b8;
    --pink-500: #e57ea3;
    --pink-600: #d6628c;
    --text:     #5a4a52;
    --muted:    #a08c93;
    --white:    #ffffff;
    --shadow:   0 12px 40px rgba(214, 98, 140, 0.18);
    --shadow-soft: 0 4px 14px rgba(214, 98, 140, 0.10);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #fff5f7 0%, #ffe4ec 50%, #fff5f7 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* Floating decorative hearts in background */
  .bg-deco {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .bg-deco span {
    position: absolute;
    color: var(--pink-200);
    font-size: 22px;
    opacity: 0.5;
    animation: float-bg 12s ease-in-out infinite;
  }
  @keyframes float-bg {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-30px) rotate(15deg); }
  }

  /* Card container */
  .card {
    background: var(--white);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 50px 45px 90px;
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
    display: none;
    animation: fadeIn 0.5s ease;
    min-height: 420px;
  }

  .card.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes fadeOut {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(-20px) scale(0.98); }
  }

  .card.exiting { animation: fadeOut 0.35s ease forwards; }

  /* Headings */
  h1 {
    font-weight: 700;
    font-size: 30px;
    color: var(--pink-600);
    margin-bottom: 18px;
    line-height: 1.3;
  }

  h2 {
    font-weight: 600;
    font-size: 22px;
    color: var(--pink-600);
    margin-bottom: 24px;
    line-height: 1.4;
  }

  p, label {
    font-weight: 400;
    color: var(--text);
    line-height: 1.65;
    font-size: 15px;
  }

  .lead {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 12px;
  }

  /* Form */
  .field { margin-bottom: 22px; }

  .field-label {
    display: block;
    font-weight: 600;
    color: var(--pink-600);
    margin-bottom: 10px;
    font-size: 15px;
  }

  input[type="text"], textarea {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--pink-100);
    border-radius: 12px;
    background: var(--pink-50);
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    transition: all 0.25s ease;
  }

  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--pink-400);
    background: var(--white);
    box-shadow: 0 0 0 4px rgba(238, 153, 184, 0.18);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    font-family: inherit;
  }

  /* Day picker */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .day-cell {
    background: var(--white);
    border: 2px solid var(--pink-100);
    border-radius: 14px;
    padding: 14px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
    position: relative;
  }

  .day-cell:hover:not(.disabled) {
    border-color: var(--pink-300);
    transform: translateY(-2px);
    box-shadow: var(--shadow-soft);
  }

  .day-cell.expanded {
    border-color: var(--pink-400);
    box-shadow: var(--shadow-soft);
  }

  .day-cell.has-selection {
    border-color: var(--pink-500);
    background: linear-gradient(135deg, var(--pink-100) 0%, var(--pink-200) 100%);
  }

  .day-cell.disabled {
    background: #f0e8ec;
    border-color: #e2d4da;
    color: #b09aa1;
    cursor: not-allowed;
    opacity: 0.7;
  }

  .day-cell.disabled .num,
  .day-cell.disabled .dow {
    color: #b09aa1;
  }

  .day-cell .dow {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .day-cell .num {
    font-size: 20px;
    font-weight: 700;
    color: var(--pink-600);
  }

  /* Meal options (revealed on click) */
  .meal-options {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }

  .day-cell.expanded .meal-options { display: flex; }

  .meal-btn {
    background: var(--white);
    border: 1.5px solid var(--pink-200);
    border-radius: 8px;
    padding: 6px 4px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--pink-600);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .meal-btn:hover:not(.unavailable) {
    background: var(--pink-100);
    border-color: var(--pink-400);
  }

  .meal-btn.chosen {
    background: linear-gradient(135deg, var(--pink-400) 0%, var(--pink-500) 100%);
    border-color: var(--pink-500);
    color: var(--white);
  }

  .meal-btn.unavailable {
    background: #ece0e4;
    border-color: #ddd0d5;
    color: #b09aa1;
    cursor: not-allowed;
  }

  .selected-info {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--pink-600);
    font-style: italic;
    min-height: 18px;
    text-align: center;
  }

  /* Continue / Submit button — bottom-right */
  .btn-continue {
    position: absolute;
    bottom: 25px;
    right: 30px;
    background: linear-gradient(135deg, var(--pink-400) 0%, var(--pink-500) 100%);
    color: var(--white);
    border: none;
    padding: 12px 28px;
    border-radius: 30px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 18px rgba(229, 126, 163, 0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .btn-continue:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(229, 126, 163, 0.45);
  }

  .btn-continue:active { transform: translateY(0); }

  .btn-continue:disabled {
    background: #e8d5dc;
    color: #b09aa1;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Back button — symmetric to continue, bottom-left */
  .btn-back {
    position: absolute;
    bottom: 25px;
    left: 30px;
    background: var(--white);
    color: var(--pink-600);
    border: 1.5px solid var(--pink-200);
    padding: 12px 28px;
    border-radius: 30px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .btn-back:hover {
    transform: translateY(-2px);
    background: var(--pink-50);
    border-color: var(--pink-300);
  }

  .btn-back:active { transform: translateY(0); }

  /* Card 4 — Save the date */
  .save-date-wrap {
    text-align: center;
    padding: 30px 0 10px;
  }

  .save-date-label {
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 18px;
    font-weight: 500;
  }

  .save-date-big {
    font-size: 56px;
    font-weight: 700;
    color: var(--pink-600);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .save-date-sub {
    font-size: 18px;
    color: var(--text);
    font-weight: 500;
  }

  .save-date-sub .name-highlight {
    color: var(--pink-500);
    font-weight: 700;
  }

  .heart-deco {
    font-size: 32px;
    color: var(--pink-400);
    margin: 18px 0 8px;
    animation: heartbeat 1.6s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.18); }
  }

  /* Final thank-you */
  .final-message {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255, 245, 247, 0.95);
    backdrop-filter: blur(8px);
    z-index: 50;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 20px;
    text-align: center;
  }

  .final-message.show { display: flex; }

  .final-message h1 {
    font-size: 42px;
    color: var(--pink-600);
    animation: pop 0.6s ease;
  }

  .final-message p {
    font-size: 18px;
    color: var(--text);
    margin-top: 16px;
    animation: pop 0.8s ease;
  }

  @keyframes pop {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* Card 1 — Annyeong title + choice buttons */
  .hero-title {
    font-size: 52px;
    font-weight: 700;
    color: var(--pink-600);
    margin-bottom: 18px;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.2;
  }

  .hero-sub {
    font-size: 16px;
    color: var(--text);
    text-align: center;
    line-height: 1.65;
    margin-bottom: 36px;
    padding: 0 8px;
  }

  .choice-wrap {
    position: relative;
    height: 70px;
    margin-top: 10px;
  }

  .choice-btn {
    border: none;
    padding: 13px 38px;
    border-radius: 30px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    color: var(--white);
    box-shadow: 0 6px 18px rgba(229, 126, 163, 0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  .choice-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(229, 126, 163, 0.45);
  }

  .yes-btn {
    background: linear-gradient(135deg, var(--pink-400) 0%, var(--pink-500) 100%);
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(calc(-100% - 12px));
  }

  .yes-btn:hover {
    transform: translateX(calc(-100% - 12px)) translateY(-2px);
  }

  .no-btn {
    background: linear-gradient(135deg, #f5b5cc 0%, #ee99b8 100%);
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(12px);
    transition: left 0.25s ease, top 0.25s ease, transform 0.25s ease;
  }

  /* Confetti hearts */
  .confetti {
    position: fixed;
    top: -30px;
    font-size: 22px;
    pointer-events: none;
    z-index: 49;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* Hint text below name input on card 1 */
  .small-hint {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    font-style: italic;
  }

  /* Inline error message */
  .error-msg {
    display: none;
    color: var(--pink-600);
    font-size: 13px;
    font-weight: 500;
    margin-top: 8px;
  }

  .error-msg.show {
    display: block;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  input.error {
    border-color: var(--pink-500) !important;
    background: #fff0f5;
  }

  /* Responsive */
  @media (max-width: 540px) {
    .card {
      padding: 40px 25px 90px;
      border-radius: 20px;
    }
    h1 { font-size: 24px; }
    h2 { font-size: 18px; }
    .save-date-big { font-size: 42px; }
    .btn-continue {
      bottom: 20px;
      right: 20px;
      padding: 10px 22px;
      font-size: 14px;
    }
    .btn-back {
      bottom: 20px;
      left: 20px;
      padding: 10px 22px;
      font-size: 14px;
    }
    .day-cell .num { font-size: 17px; }
    .day-cell { padding: 12px 4px; }
  }

  @media (max-width: 360px) {
    .day-grid { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 22px; }
    .save-date-big { font-size: 36px; }
  }
</style>
</head>
<body>

<div class="bg-deco" id="bgDeco"></div>

<!-- ============ CARD 1 — Annyeong + lựa chọn ============ -->
<div class="card active" id="card1">
  <h1 class="hero-title">Annyeong~~</h1>
  <p class="hero-sub">
    Chào Linh Bi, anh về tới Hà Nội rồi đây.
    Lần này về, anh sẽ vui hơn rất nhiều nếu hẹn gặp được Linh đó ^^
  </p>
  <div class="choice-wrap" id="choiceWrap">
    <button class="choice-btn yes-btn" onclick="goTo(3)">Vângg</button>
    <button class="choice-btn no-btn" id="noBtn">Hôngg</button>
  </div>
</div>

<!-- ============ CARD 2 — Nhập tên ============ -->
<div class="card" id="card2">
  <h2>Em bé nhà ai đây nhờ?</h2>
  <div class="field">
    <input type="text" id="nameInput" placeholder="Ví dụ: Bống, Cún, Mây..." autocomplete="off" />
    <div class="small-hint">Anh nhớ tên bạn này rồi nha!</div>
    <div class="error-msg" id="nameError">Ai quên điền thông tin rồi kìa!</div>
  </div>
  <button class="btn-back" onclick="goTo(1)">← Quay lại</button>
  <button class="btn-continue" id="btn2" onclick="confirmName()">Tiếp tục →</button>
</div>

<!-- ============ CARD 3 — Thông tin buổi date ============ -->
<div class="card" id="card3">
  <h2 id="card3Title">Hôm nào là hôm nàoo</h2>

  <div class="field">
    <label class="field-label">Em rảnh vào khi nào? </label>
    <div class="day-grid" id="dayGrid"></div>
    <!-- <div class="selected-info" id="selectedInfo">Bấm vào một ngày để chọn bữa nha ♡</div> -->
  </div>

  <div class="field">
    <label class="field-label" for="allergyInput">
      Để giúp anh chuẩn bị buổi date.. em có dị ứng hay không ăn được gì không?
    </label>
    <textarea id="allergyInput" placeholder="."></textarea>
  </div>

  <div class="field">
    <label class="field-label" for="moodInput">Buổi date nên theo playlist mood gì ta?</label>
    <input type="text" id="moodInput" placeholder="" />
  </div>

  <button class="btn-back" onclick="goTo(1)">← Quay lại</button>
  <button class="btn-continue" id="btn3" onclick="goToConfirm()">Tiếp tục →</button>
</div>

<!-- ============ CARD 4 — Save the date ============ -->
<div class="card" id="card4">
  <div class="save-date-wrap">
    <div class="save-date-label">Save the date</div>
    <div class="save-date-big" id="saveDateBig">—</div>
    <div class="save-date-sub" id="saveDateSub">Hẹn gặp em nha</div>
    <!-- <div class="heart-deco">♡</div> -->
  </div>
  <button class="btn-back" onclick="goTo(3)">← Quay lại</button>
  <button class="btn-continue" onclick="submitFinal()">Gửi</button>
</div>

<!-- ============ Final message ============ -->
<div class="final-message" id="finalMessage">
  <h1>See yaaa!</h1>
  <!-- <p>Anh sẽ chuẩn bị thật chu đáo cho buổi hẹn của hai đứa~</p> -->
</div>

<script>
  /* ---------- Background floating hearts ---------- */
  const bgDeco = document.getElementById('bgDeco');
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('span');
    el.textContent = ['♡', '✿', '♥'][Math.floor(Math.random() * 3)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = Math.random() * 100 + 'vh';
    el.style.fontSize = (16 + Math.random() * 22) + 'px';
    el.style.animationDelay = (Math.random() * 12) + 's';
    el.style.animationDuration = (8 + Math.random() * 8) + 's';
    bgDeco.appendChild(el);
  }

  /* ---------- State ---------- */
  const state = {
    name: 'Linh Bi',
    day: null,    // { d, m, dow, meal }
    allergy: '',
    mood: ''
  };

  // Pre-fill the card-3 title with the fixed name
  document.getElementById('card3Title').textContent =
    `Bạn ${state.name} rảnh gặp anh Híu hôm nào nhờ?`;

  /* ---------- Day picker ----------
     fullDisabled: cả ngày không khả dụng
     dinnerDisabled: chỉ buổi tối không khả dụng
  */
  const days = [
    { d: 4, m: 5, dow: 'Thứ 2', lunchDisabled: true },
    { d: 5, m: 5, dow: 'Thứ 3', dinnerDisabled: true },
    { d: 6, m: 5, dow: 'Thứ 4', fullDisabled: true },
    { d: 7, m: 5, dow: 'Thứ 5', dinnerDisabled: true },
    { d: 8, m: 5, dow: 'Thứ 6' },
    { d: 9, m: 5, dow: 'Thứ 7' },
  ];

  const grid = document.getElementById('dayGrid');
  const selectedInfo = document.getElementById('selectedInfo');

  days.forEach(day => {
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (day.fullDisabled ? ' disabled' : '');

    const lunchUnavail = day.fullDisabled || day.lunchDisabled;
    const dinnerUnavail = day.fullDisabled || day.dinnerDisabled;

    cell.innerHTML = `
      <div class="dow">${day.dow}</div>
      <div class="num">${day.d}/${day.m}</div>
      <div class="meal-options">
        <button type="button" class="meal-btn ${lunchUnavail ? 'unavailable' : ''}" data-meal="lunch">Lunch</button>
        <button type="button" class="meal-btn ${dinnerUnavail ? 'unavailable' : ''}" data-meal="dinner">Dinner</button>
      </div>
    `;

    if (day.fullDisabled) {
      grid.appendChild(cell);
      return;
    }

    // Click on day: expand/collapse
    cell.addEventListener('click', (e) => {
      if (e.target.classList.contains('meal-btn')) return;
      const isOpen = cell.classList.contains('expanded');
      document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('expanded'));
      if (!isOpen) cell.classList.add('expanded');
    });

    // Meal selection
    cell.querySelectorAll('.meal-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (btn.classList.contains('unavailable')) return;

        // Clear all previous selections across all cells
        document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('chosen'));
        document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('has-selection'));

        btn.classList.add('chosen');
        cell.classList.add('has-selection');

        const mealLabel = btn.dataset.meal === 'lunch' ? 'Lunch' : 'Dinner';
        state.day = { ...day, meal: btn.dataset.meal, mealLabel };
        selectedInfo.textContent = `Đã chọn: ${mealLabel} ngày ${day.d}/${day.m} ♡`;
      });
    });

    grid.appendChild(cell);
  });

  /* ---------- Window navigation ---------- */
  function goTo(n) {
    const current = document.querySelector('.card.active');
    const next = document.getElementById('card' + n);
    if (!current || !next || current === next) return;

    current.classList.add('exiting');
    setTimeout(() => {
      current.classList.remove('active', 'exiting');
      next.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 350);
  }

  function confirmName() {
    const input = document.getElementById('nameInput');
    const error = document.getElementById('nameError');
    const v = input.value.trim();
    if (!v) {
      error.classList.remove('show');
      // re-trigger animation
      void error.offsetWidth;
      error.classList.add('show');
      input.classList.add('error');
      input.focus();
      return;
    }
    error.classList.remove('show');
    input.classList.remove('error');
    state.name = v;
    document.getElementById('card3Title').textContent =
      `Bạn ${state.name} rảnh gặp anh Híu hôm nào nhờ?`;
    goTo(3);
  }

  // Hide error as soon as user starts typing
  document.getElementById('nameInput').addEventListener('input', () => {
    document.getElementById('nameError').classList.remove('show');
    document.getElementById('nameInput').classList.remove('error');
  });

  function goToConfirm() {
    if (!state.day) {
      alert('Em chọn giúp anh một ngày nha');
      return;
    }
    state.allergy = document.getElementById('allergyInput').value.trim();
    state.mood = document.getElementById('moodInput').value.trim();

    // Format date as English ordinal — "7th May"
    const ord = ordinal(state.day.d);
    const monthName = monthNameEN(state.day.m);
    document.getElementById('saveDateBig').textContent = `${ord} ${monthName}`;
    const safeName = state.name.replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
    document.getElementById('saveDateSub').innerHTML =
      `Hẹn gặp <span class="name-highlight">${safeName}</span> nha!`;

    goTo(4);
  }

  function ordinal(n) {
    const s = ['th', 'st', 'nd', 'rd'];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function monthNameEN(m) {
    return ['January','February','March','April','May','June',
            'July','August','September','October','November','December'][m - 1];
  }

  /* ---------- Submit + confetti ---------- */
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwgE3SN3XNiSX52RuSZfZWziHpD_hrN8D7RTbDet4QZBFOGqlnm_PRlCw4K_ZJ8B9rTcQ/exec';

  function submitFinal() {
    launchConfetti();

    // Send data to Google Sheet via Apps Script.
    // Use text/plain content type to avoid CORS preflight (Apps Script reads
    // raw POST body via e.postData.contents regardless of Content-Type).
    const payload = {
      name:     state.name,
      date:     state.day ? `${state.day.d}/${state.day.m}` : '',
      meal:     state.day ? (state.day.mealLabel || '') : '',
      allergy:  document.getElementById('allergyInput').value.trim(),
      mood:     document.getElementById('moodInput').value.trim()
    };

    fetch(SHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).catch(err => console.error('Submit error:', err));

    setTimeout(() => {
      document.getElementById('card4').classList.remove('active');
      document.getElementById('finalMessage').classList.add('show');
    }, 350);
  }

  function launchConfetti() {
    const symbols = ['♡', '♥', '✿', '❀', '♡'];
    const colors  = ['#ee99b8', '#f5b5cc', '#e57ea3', '#fbcfe0', '#d6628c'];
    for (let i = 0; i < 70; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.color = colors[Math.floor(Math.random() * colors.length)];
      piece.style.fontSize = (16 + Math.random() * 22) + 'px';
      piece.style.animationDuration = (3 + Math.random() * 3) + 's';
      piece.style.animationDelay = (Math.random() * 0.6) + 's';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 7000);
    }
    // Continuous gentle rain for 4s
    let count = 0;
    const interval = setInterval(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.color = colors[Math.floor(Math.random() * colors.length)];
      piece.style.fontSize = (14 + Math.random() * 22) + 'px';
      piece.style.animationDuration = (3 + Math.random() * 3) + 's';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 7000);
      if (++count > 40) clearInterval(interval);
    }, 100);
  }

  /* Enter key on name input → continue */
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); confirmName(); }
  });

  /* ---------- "Hôngg" runaway button ---------- */
  const noBtn = document.getElementById('noBtn');
  const choiceWrap = document.getElementById('choiceWrap');
  const card1 = document.getElementById('card1');

  function moveNoBtn() {
    const cardRect = card1.getBoundingClientRect();
    const wrapRect = choiceWrap.getBoundingClientRect();
    const btnRect  = noBtn.getBoundingClientRect();

    const padding = 16;
    // Pick a random target inside card1's box
    const targetX = padding + Math.random() * (cardRect.width  - btnRect.width  - padding * 2);
    const targetY = padding + Math.random() * (cardRect.height - btnRect.height - padding * 2);

    // noBtn is positioned absolutely relative to choiceWrap — convert card coords → wrap coords
    const offsetX = wrapRect.left - cardRect.left;
    const offsetY = wrapRect.top  - cardRect.top;

    noBtn.style.left = (targetX - offsetX) + 'px';
    noBtn.style.top  = (targetY - offsetY) + 'px';
    noBtn.style.transform = 'none';
  }

  // Move on hover AND on click/touch (so it works on mobile too)
  noBtn.addEventListener('mouseenter', moveNoBtn);
  noBtn.addEventListener('click', (e) => { e.preventDefault(); moveNoBtn(); });
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoBtn(); }, { passive: false });
</script>
